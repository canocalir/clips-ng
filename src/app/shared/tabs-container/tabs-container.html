<!-- Tabs -->
<nav class="flex flex-nowrap mb-4 text-center">
  @for(tab of tabs(); track $index){
  <a
    class="block w-full rounded py-3 px-4 transition hover:text-white text-white"
    href="#"
    [ngClass]="{
      'hover: bg-indigo-400': tab.isActive(),
      'hover: text-white': tab.isActive(),
    }"
    (click)="selectTab(tab)"
    >{{tab.tabTitle()}}</a
  >
  }
</nav>

<ng-content></ng-content>
